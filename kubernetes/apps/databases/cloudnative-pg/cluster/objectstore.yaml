---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: homelab-store
spec:
  configuration:
    destinationPath: s3://homelab/cnpg
    endpointURL: https://${GARAGE_URL}
    s3Credentials:
      accessKeyId:
        name: garage
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: garage
        key: SECRET_ACCESS_KEY
    wal:
      compression: zstd
    data:
      compression: gzip
  retentionPolicy: "14d"
