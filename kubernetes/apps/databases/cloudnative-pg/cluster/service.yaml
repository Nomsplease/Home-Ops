apiVersion: v1
kind: Service
metadata:
  name: postgres-external
  namespace: databases
  labels:
    app: postgres
  annotations:
    lbipam.cilium.io/ips: 10.1.20.23
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    cnpg.io/cluster: postgres
    role: primary
