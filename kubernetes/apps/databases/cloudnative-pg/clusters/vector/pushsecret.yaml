---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/pushsecret_v1alpha1.json
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: vector-app
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: onepassword-connect
      kind: ClusterSecretStore
  selector:
    secret:
      name: vector-app
  template:
    engineVersion: v2
    data:
      VECTOR_APP_USERNAME: '{{ index . "username" }}'
      VECTOR_APP_PASSWORD: '{{ index . "password" }}'
  data:
    - match:
        secretKey: &key VECTOR_APP_USERNAME
        remoteRef:
          remoteKey: cloudnative-pg
          property: *key
    - match:
        secretKey: &key VECTOR_APP_PASSWORD
        remoteRef:
          remoteKey: cloudnative-pg
          property: *key