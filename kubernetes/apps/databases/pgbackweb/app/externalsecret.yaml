---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pgbackweb
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: pgbackweb-secret
    template:
      engineVersion: v2
      data:
        PBW_ENCRYPTION_KEY: "{{ .PBW_ENCRYPTION_KEY }}"
        PBW_POSTGRES_CONN_STRING: 'postgresql://"{{ .appUser }}":"{{ .appPassword }}"@main-db-rw:5432/pgbackweb?sslmode=disable'
  dataFrom:
    - extract:
        key: cloudnative-pg
    - extract:
        key: PGBackWeb