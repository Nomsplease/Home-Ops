---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: immich
    template:
      engineVersion: v2
      data:
        DB_USERNAME: "{{ .VECTOR_APP_USERNAME }}"
        DB_PASSWORD: "{{ .VECTOR_APP_PASSWORD }}"
  dataFrom:
    - extract:
        key: cloudnative-pg