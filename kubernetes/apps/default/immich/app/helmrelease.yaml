---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: immich
  values:
    controllers:
      main:
        containers:
          main:
            image:
              # renovate: datasource=github-releases depName=immich-app/immich
              tag: v3.0.3
            env:
              DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-postgres"
                    key: url
              LOG_LEVEL: verbose
              REDIS_DBINDEX: "3"
              REDIS_HOSTNAME: dragonfly.databases
              REDIS_PORT: "6379"
              TZ: ${TIMEZONE}

    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: immich

    server:
      route:
        main:
          hostnames:
            - "photos.${SECRET_DOMAIN}"
          parentRefs:
            - name: envoy-external
              namespace: network
              sectionName: https
          rules:
            - backendRefs:
                - name: immich-server
                  port: 2283

    machine-learning:
      persistence:
        cache:
          enabled: true
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          size: 15Gi
          storageClass: ceph-block
      controllers:
        main:
          strategy: Recreate
          containers:
            main:
              resources:
                limits:
                  gpu.intel.com/i915: 1