---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich
  namespace: default
spec:
  components:
    - ../../../../components/kopiur/backup
    - ../../../../components/kopiur/migrate
    - ../../../../components/postgres/cert
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: databases
    - name: intel-device-plugins-gpu
      namespace: kube-system
    - name: kopiur
      namespace: kopiur-system
  interval: 30m
  path: ./kubernetes/apps/default/immich/app
  postBuild:
    substitute:
      APP: immich
      DATABASE_EXTENSIONS: |
        [
          { name: vector },
          { name: vchord },
          { name: cube },
          { name: earthdistance }
        ]
      KOPIUR_CAPACITY: 500Gi
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true 
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  timeout: 5m
  wait: false