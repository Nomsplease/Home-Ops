---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntfy
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ntfy
    template:
      engineVersion: v2
      data:
        NTFY_AUTH_USERS: "{{ .authUsers }}"
        NTFY_AUTH_ACCESS: "{{ .authAccess }}"
        NTFY_AUTH_TOKENS: "{{ .authTokens }}"
  dataFrom:
    - extract:
        key: ntfy
