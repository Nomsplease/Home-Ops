---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: patchmon
  namespace: default
spec:
  components:
    - ../../../../components/postgres/cert
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: databases
  interval: 30m
  path: ./kubernetes/apps/default/patchmon/app
  postBuild:
    substitute:
      APP: patchmon
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true 
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  timeout: 5m
  wait: false
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: patchmon-guacd
  namespace: default
spec:
  interval: 30m
  path: ./kubernetes/apps/default/patchmon/guacd
  postBuild:
    substitute:
      APP: patchmon-guacd
  prune: true 
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  timeout: 5m
  wait: false