---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app qbittorrent
  namespace: &namespace default
spec:
  components:
    - ../../../../components/app-template
    - ../../../../components/nfs-scaler
    - ../../../../components/volsync
    - ../../../../components/volsync-rwx
  dependsOn:
    - name: multus-networks
      namespace: kube-system
    - name: volsync
      namespace: volsync-system
  interval: 1h
  path: ./kubernetes/apps/default/qbittorrent/app
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 2Gi
      VOLSYNC_RWX_CAPACITY: 500Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: false
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cross-seed
spec:
  components:
    - ../../../../components/app-template
  dependsOn:
    - name: qbittorrent
  interval: 1h
  path: ./kubernetes/apps/default/qbittorrent/cross-seed
  postBuild:
    substitute:
      APP: cross-seed
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false