---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reitti
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: reitti
  values:
    controllers:
      reitti :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: dedicatedcode/reitti
              tag: 4.0.5@sha256:03ab9c781552f89f8c5f4b39fec5397566f873010c2fd013ff7a8ce1414a3bca
            env:
              OIDC_ENABLED: "true"
              POSTGIS_DB: "{{ .Release.Name }}"
              POSTGIS_HOST: postgis-rw.databases
              REDIS_HOST: reitti-valkey
              SERVER_PORT: &port 80
              TILES_CACHE: http://reitti-tile-cache
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "location.noms.tv"
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"