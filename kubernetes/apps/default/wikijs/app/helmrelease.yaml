---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wikijs
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: wikijs
  values:
    configMaps:
      config:
        suffix: config
        data:
          config.yml: |-
            port: 80
            bindIP: 0.0.0.0
            db:
              type: postgres
              host: pooler-rw.databases.svc
              port: 5432
              user: wikijs
              db: wikijs
              ssl: true
              sslOptions:
                auto: false
                rejectUnauthorized: true
                ca: /var/run/secrets/root-ca/ca.crt
                cert: /var/run/secrets/postgresql/tls.crt
                key: /var/run/secrets/postgresql/tls.key
            ssl:
              enabled: false
            logLevel: info
            logFormat: default
            ha: false
    controllers:
      wikijs:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: requarks/wiki
              tag: 2.5.314
            env:
              CONFIG_FILE: /config/config.yml
              TZ: ${TIMEZONE}
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 80
                  failureThreshold: 6
                  periodSeconds: 10
              readiness: *probes
              startup: *probes
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    persistence:
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config
            readOnly: true
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "wiki.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https