---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agones
spec:
  interval: 1h
  chart:
    spec:
      chart: agones
      version: "1.58.0"
      sourceRef:
        kind: HelmRepository
        name: agones
  values:
    crds:
      CleanupOnDelete: false
    gameservers:
      namespaces:
        - games
    agones:
      controller:
        replicas: 1
      ping:
        install: false
      allocator:
        install: false
