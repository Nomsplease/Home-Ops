---
apiVersion: agones.dev/v1
kind: Fleet
metadata:
  name: ark-survival-evolved
  labels:
    game: ark-survival-evolved
spec:
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        game: ark-survival-evolved
      annotations:
        steam-buildid: "0"
    spec:
      ports:
        - name: game
          portPolicy: Dynamic
          containerPort: 7777
          protocol: UDP
        - name: raw-udp
          portPolicy: Dynamic
          containerPort: 7778
          protocol: UDP
        - name: query
          portPolicy: Dynamic
          containerPort: 27015
          protocol: UDP
        - name: rcon
          portPolicy: Dynamic
          containerPort: 27020
          protocol: TCP
      health:
        disabled: true
      template:
        metadata:
          labels:
            game: ark-survival-evolved
        spec:
          containers:
            - name: ark-server
              image: cm2network/steamcmd:steam-bookworm
              env:
                - name: STEAM_USER
                  valueFrom:
                    secretKeyRef:
                      name: steam-credentials
                      key: username
                - name: STEAM_PASS
                  valueFrom:
                    secretKeyRef:
                      name: steam-credentials
                      key: password
              command:
                - /bin/bash
                - -c
                - |
                  /home/steam/steamcmd/steamcmd.sh \
                    +force_install_dir /ark-data/server \
                    +login "$STEAM_USER" "$STEAM_PASS" \
                    +app_update 376030 -beta preaquatica validate \
                    +quit
                  cd /ark-data/server
                  ./ShooterGame/Binaries/Linux/ShooterGameServer \
                    "TheIsland?listen?SessionName=ArkServer?MaxPlayers=20?RCONEnabled=True?RCONPort=27020?QueryPort=27015" \
                    -server -log -NoBattlEye -crossplay
              resources:
                requests:
                  cpu: "2"
                  memory: 4Gi
                limits:
                  memory: 12Gi
              volumeMounts:
                - name: ark-data
                  mountPath: /ark-data
          volumes:
            - name: ark-data
              persistentVolumeClaim:
                claimName: ark-survival-evolved
