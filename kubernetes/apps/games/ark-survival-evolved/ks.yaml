---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ark-survival-evolved
  namespace: games
spec:
  dependsOn:
    - name: agones
      namespace: games
  interval: 30m
  path: ./kubernetes/apps/games/ark-survival-evolved/app
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: ark-survival-evolved
      VOLSYNC_CAPACITY: 100Gi
      VOLSYNC_SCHEDULE: "0 * * * *"
      VOLSYNC_HOURLY: "4"
  prune: true
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: games
  timeout: 5m
  wait: false
