---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
spec:
  chartRef:
    kind: OCIRepository
    name: n8n
  interval: 30m
  values:
    controllers:
      n8n:
        type: deployment
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/n8n-io/n8n
              tag: 2.32.3@sha256:c848162d17a99af20792358e4b075658ad00a80301419415305d66d10888d3f2
            env:
              DB_TYPE: postgresdb
              DB_POSTGRESDB_HOST: pooler-rw.databases.svc
              DB_POSTGRESDB_PORT: "5432"
              DB_POSTGRESDB_DATABASE: "{{ .Release.Name }}"
              DB_POSTGRESDB_USER: "{{ .Release.Name }}"
              DB_POSTGRESDB_SSL_ENABLED: "true"
              DB_POSTGRESDB_SSL_CA_FILE: /var/run/secrets/root-ca/ca.crt
              DB_POSTGRESDB_SSL_CERT_FILE: /var/run/secrets/postgresql/tls.crt
              DB_POSTGRESDB_SSL_KEY_FILE: /var/run/secrets/postgresql/tls.key
              N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
              N8N_HIRING_BANNER_ENABLED: "false"
              N8N_HOST: "n8n.noms.tv"
              N8N_PORT: &port 80
              NODE_ENV: production
              WEBHOOK_URL: "https://n8n.noms.tv/"
              GENERIC_TIMEZONE: "America/New_York"
              TZ: "America/New_York"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  failureThreshold: 6
                  periodSeconds: 10
              readiness: *probes
              startup: *probes
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.noms.tv"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /home/node/.n8n
