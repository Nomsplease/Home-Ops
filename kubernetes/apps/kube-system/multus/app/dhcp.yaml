---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: multus-dhcp-ds
  labels:
    app.kubernetes.io/name: multus-dchp
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: multus-dchp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: multus-dchp
    spec:
      hostNetwork: true
      tolerations:
      - operator: Exists
        effect: NoSchedule
      initContainers:
      - name: clean-up
        image: busybox
        command: [ "/bin/sh" ]
        args: [ "-c", "rm -f /host/run/cni/dhcp.sock" ]
        securityContext:
          privileged: true
        volumeMounts:
        - name: socketpath
          mountPath: /host/run/cni
      containers:
      - name: kube-dhcp
        image: quay.io/k0sproject/cni-node:1.8.0-k0s.0
        command:
        - /opt/cni/bin/dhcp
        args:
        - daemon
        - -hostprefix
        - /host
        resources:
          requests:
            cpu: "1m"
            memory: "50Mi"
          limits:
            cpu: "1m"
            memory: "50Mi"
        securityContext:
          privileged: true
        volumeMounts:
        - name: socketpath
          mountPath: /host/run/cni
        - name: procpath
          mountPath: /host/proc
        - name: netnspath
          mountPath: /host/var/run/netns
          mountPropagation: HostToContainer
      volumes:
      - name: socketpath
        hostPath:
          path: /run/cni
      - name: procpath
        hostPath:
          path: /proc
      - name: netnspath
        hostPath:
          # Fix for Talos. Default = /run/netns
          path: /var/run/netns