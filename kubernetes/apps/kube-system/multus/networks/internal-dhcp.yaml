---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: internal-dhcp
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "name": "internal-dhcp",
      "plugins": [
        {
          "type": "macvlan",
          "master": "bond0.10",
          "mode": "bridge",
          "ipam": {
              "type": "dhcp",
              "routes": [
                { "dst": "0.0.0.0/0", "gw": "10.1.10.1" }
              ],
              "provide": [
                {
                  "option": "host-name",
                  "fromArg": "dhcp-host-name"
                },
                {
                  "option": "host-name",
                  "fromArg": "K8S_POD_NAME"
                }
            ]
          }
        },
        {
          "type": "sbr"
        }
      ]
    }
