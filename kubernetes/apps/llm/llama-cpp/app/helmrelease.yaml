---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-cpp
spec:
  chartRef:
    kind: OCIRepository
    name: llama-cpp
  interval: 1h
  timeout: 30m
  values:
    controllers:
      llama-cpp:
        pod:
          nodeSelector:
            kubernetes.io/hostname: main-8
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        type: deployment
        initContainers:
          download-qwen:
            image:
              repository: ghcr.io/astral-sh/uv
              tag: python3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                uv pip install --system --no-cache huggingface_hub
                download-model bartowski/Qwen_Qwen3.6-35B-A3B-GGUF:Q4_K_M
            env:
              HUGGINGFACE_HUB_CACHE: /models
              HF_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: llama-cpp-secret
                    key: HF_TOKEN
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-cuda@sha256:62a1d4e144789aa3dd6948d350388fd4b9ac4d12744f33213a89c4e5a9af25df
            args:
              - --metrics
              - --model
              - /models/models--bartowski--Qwen_Qwen3.6-35B-A3B-GGUF/model.gguf
              - --mmproj
              - /models/models--bartowski--Qwen_Qwen3.6-35B-A3B-GGUF/mmproj.gguf
              - --ctx-size
              - "131072"
              - --no-mmap
              - --flash-attn
              - on
              - --sleep-idle-seconds
              - "60"
              - --spec-type
              - draft-mtp
              - --spec-draft-n-max
              - "2"
              - --temp
              - "1.0"
              - --top-k
              - "64"
              - --top-p
              - "0.95"
              - --alias
              - Qwen3.6
            env:
              LLAMA_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: llama-cpp-secret
                    key: LLAMA_API_KEY
              LLAMA_ARG_HOST: 0.0.0.0
              LLAMA_ARG_PORT: &port 8080
              LLAMA_OFFLINE: "1"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  failureThreshold: 3
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  failureThreshold: 3
                  periodSeconds: 10
                  timeoutSeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  failureThreshold: 60
                  periodSeconds: 10
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 4Gi
              limits:
                memory: 48Gi
                nvidia.com/gpu: 1
            securityContext:
              privileged: true
    defaultPodOptions:
      runtimeClassName: nvidia
    service:
      app:
        controller: llama-cpp
        ports:
          http:
            port: *port
    persistence:
      download-script:
        type: configMap
        name: llama-cpp-download-script
        defaultMode: 0o755
        advancedMounts:
          llama-cpp:
            download-qwen:
              - path: /usr/bin/download-model
                subPath: download-model.sh
                readOnly: true
      models:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 100Gi
        storageClass: ceph-block
        advancedMounts:
          llama-cpp:
            app:
              - path: /models
                readOnly: true
            download-qwen:
              - path: /models
                readOnly: false
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
