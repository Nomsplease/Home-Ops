---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: openclaw
  values:
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.6.11@sha256:3814fb1f62f9cfc5944de088c5817c68c88b5d721feebe36420b666a90a61ce7
            env:
              TZ: America/New_York
              OPENCLAW_LOG_LEVEL: info
              HOME: /home/openclaw
              OPENCLAW_HOME: /home/openclaw
              OPENCLAW_GATEWAY_PORT: 8080
              # NOTE: openclaw reads gateway config only from ~/.openclaw/openclaw.json (via
              # `openclaw config set`); OPENCLAW_GATEWAY_* env vars are NOT honored for these
              # settings. The Control UI origin allowlist, trusted-proxy CIDR, and auth mode are
              # applied by the `setup` initContainer below.
              PIP_BREAK_SYSTEM_PACKAGES: "1"
            envFrom:
              - secretRef:
                  name: openclaw-secret
            # workingDir is intentionally unset: the openclaw entrypoint relies on a relative path
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            probes:
              liveness:
                enabled: true
                port: 8080
              readiness:
                enabled: true
                port: 8080
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi
          opencode:
            image:
              repository: ghcr.io/anomalyco/opencode
              tag: 1.17.13@sha256:8e1744b36fb0b828591094db8905e5e6fc9fa1f242606923e9ae6132d6d15740
            command: ["/usr/local/bin/opencode"]
            args: ["web", "--hostname", "0.0.0.0", "--port", "$(HTTP_PORT)", "--cors", "opencode.${SECRET_DOMAIN}"]
            env:
              TZ: America/New_York
              OPENCLAW_LOG_LEVEL: info
              HOME: /home/openclaw
              OPENCLAW_HOME: /home/openclaw
              OPENCLAW_GATEWAY_PORT: 8080
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              HTTP_PORT: 8081
              # opencode tries to auto-launch a browser via `xdg-open` on startup; that binary
              # doesn't exist in this image and the failed spawn crashes the process, so a no-op
              # stub is written to /opt/stubs by the browser-stub initContainer and put first on PATH.
              PATH: /opt/stubs:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            envFrom:
              - secretRef:
                  name: openclaw-secret
            workingDir: /home/openclaw
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            probes:
              liveness:
                enabled: true
                port: 8081
              readiness:
                enabled: true
                port: 8081
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
        initContainers:
          browser-stub:
            # Writes a no-op `xdg-open` to /opt/stubs so opencode's auto-launch-browser
            # spawn call succeeds instead of crashing the container (see opencode's PATH env).
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.38.0@sha256:7e2c04dd50ede647bf4a7a4c8dbd629dd4971cd139b9b88fb22bfc3c7a6c13df
            command:
              - "sh"
              - "-c"
              - |
                printf '#!/bin/sh\nexit 0\n' > /opt/stubs/xdg-open
                chmod +x /opt/stubs/xdg-open
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
          setup:
            # `setup` blocks startup until you `kubectl exec` into this initContainer and run `openclaw setup`,
            # which writes $(HOME)/.openclaw/openclaw.json so the main containers can start. Once the file
            # exists, it idempotently applies the reverse-proxy config the gateway needs:
            #   - controlUi.allowedOrigins: bind is `lan`, so the gateway enforces browser-origin checks;
            #     the browser Origin header is the full scheme+host it's reached at.
            #   - trustedProxies: Envoy reaches the gateway from a pod IP (172.20.0.0/16), so forwarded
            #     headers are otherwise rejected as untrusted and clients aren't detected as local.
            #   - auth.mode=trusted-proxy: pocket-id (via the oidc SecurityPolicy on this route) is the
            #     real login gate, so per-device pairing is not needed. Envoy injects a fixed
            #     `X-Openclaw-User: operator` header (see route.app filter) that openclaw trusts as the
            #     operator identity. The header is `set` (overwritten) by Envoy so clients can't spoof it,
            #     and is only trusted from the trustedProxies CIDR above.
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.6.11@sha256:3814fb1f62f9cfc5944de088c5817c68c88b5d721feebe36420b666a90a61ce7
            command:
              - "sh"
              - "-c"
              - |
                while [ ! -s $(HOME)/.openclaw/openclaw.json ]; do
                  echo 'OpenClaw has not been setup, please exec to this container and run `openclaw setup` for the app to startup!';
                  sleep 60;
                done;
                openclaw config set gateway.controlUi.allowedOrigins '["https://openclaw.${SECRET_DOMAIN}"]' --strict-json;
                openclaw config set gateway.trustedProxies '["172.20.0.0/16"]' --strict-json;
                openclaw config set gateway.auth.mode trusted-proxy;
                # userHeader must be set before the --strict-json calls below: it's required whenever
                # the trustedProxy object is schema-validated, and array/bool values need --strict-json.
                openclaw config set gateway.auth.trustedProxy.userHeader X-Openclaw-User;
                openclaw config set gateway.auth.trustedProxy.allowUsers '["operator"]' --strict-json;
                openclaw config set gateway.auth.trustedProxy.allowLoopback true --strict-json;
            env:
              TZ: America/New_York
              OPENCLAW_LOG_LEVEL: info
              HOME: /home/openclaw
              OPENCLAW_HOME: /home/openclaw
              OPENCLAW_GATEWAY_PORT: 8080
              PIP_BREAK_SYSTEM_PACKAGES: "1"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
        serviceAccount:
          identifier: openclaw
    serviceAccount:
      openclaw: {}
    rbac:
      roles:
        openclaw:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["patch", "update"]
      bindings:
        openclaw:
          type: RoleBinding
          roleRef:
            identifier: openclaw
          subjects:
            - identifier: openclaw
        openclaw-view:
          type: ClusterRoleBinding
          roleRef:
            kind: ClusterRole
            name: view
          subjects:
            - identifier: openclaw
    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: openclaw
        ports:
          http:
            port: 80
            targetPort: 8080
      opencode:
        controller: openclaw
        ports:
          http:
            port: 80
            targetPort: 8081
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
            # Envoy asserts the operator identity for openclaw's trusted-proxy auth mode. `set`
            # (not `add`) overwrites any client-supplied value, so this header can't be spoofed;
            # openclaw only honors it because the source is in gateway.trustedProxies. Access is
            # gated upstream by the pocket-id oidc SecurityPolicy attached to this route.
            filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  set:
                    - name: X-Openclaw-User
                      value: operator
      opencode:
        hostnames:
          - "opencode.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: opencode
                port: http
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - subPath: data
            path: /home/openclaw
      tmp:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /tmp
      scripts:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /opt/stubs
