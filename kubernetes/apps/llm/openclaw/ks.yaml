---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openclaw
  namespace: llm
spec:
  components:
    - ../../../../components/oidc/envoy
    - ../../../../components/kopiur/backup
  dependsOn:
    - name: pocket-id
      namespace: security
    - name: volsync
      namespace: volsync-system
  interval: 30m
  path: ./kubernetes/apps/llm/openclaw/app
  postBuild:
    substitute:
      APP: openclaw
      # openclaw defines two routes, so the app's HTTPRoute is `openclaw-app`, not `openclaw`.
      # The oidc component defaults its SecurityPolicy targetRef to ${APP}, so pin it explicitly
      # or the policy attaches to a non-existent route and the SSO gate never applies.
      HTTPROUTE_NAME: openclaw-app
      APP_ICON_URL: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/openclaw.svg"
      OIDC_APP_NAME: ChatBot (Openclaw)
      KOPIUR_CAPACITY: 5Gi
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: llm
  timeout: 5m
  wait: false
