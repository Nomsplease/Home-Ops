---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app aurral
spec:
  components:
    - ../../../../components/kopiur/backup
    - ../../../../components/oidc/envoy
  dependsOn:
    - name: kopiur
      namespace: kopiur-system
    - name: pocket-id
      namespace: security
  interval: 30m
  path: ./kubernetes/apps/media/aurral/app
  postBuild:
    substitute:
      APP: *app
      APP_ICON_URL: "https://raw.githubusercontent.com/lklynet/aurral/refs/heads/release/v2/docs/src/assets/logo.svg"
      OIDC_APP_NAME: Music Playlists (Aurral)
      KOPIUR_CAPACITY: 5Gi
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true 
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false