---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: emby
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: emby
  values:
    controllers:
      emby:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/emby
              tag: 4.9.5.0@sha256:137b8d2de08dc5c82799318c9c4d876c80ad8c9b4733a9bc0db18b26f2943dc0
            env:
              TZ: America/New_York
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /System/Ping
                    port: &port 8096
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 100m
              limits:
                gpu.intel.com/i915: 1
                memory: 16Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.1.20.22
        externalTrafficPolicy: Local
        ports:
          http:
            port: *port
    # route:
    #   app:
    #     hostnames:
    #       - "{{ .Release.Name }}.${SECRET_DOMAIN}"
    #     parentRefs:
    #       - name: envoy-external
    #         namespace: network
    #         sectionName: https
    #     rules:
    #       # Native Emby clients (apps, TVs, casting) can't complete a browser OIDC
    #       # redirect, so these paths skip forward auth. The oidc/envoy-partial
    #       # component only targets the "protected" rule below via sectionName.
    #       - name: bypass
    #         matches:
    #           - path:
    #               type: RegularExpression
    #               value: ^/emby($|/.*)
    #           - path:
    #               type: RegularExpression
    #               value: ^/embywebsocket($|/.*)
    #           - path:
    #               type: RegularExpression
    #               value: ^/websocket($|/.*)
    #           - path:
    #               type: RegularExpression
    #               value: ^/emby/Sessions($|/.*)
    #           - path:
    #               type: RegularExpression
    #               value: ^/emby/Users($|/.*)
    #           - path:
    #               type: RegularExpression
    #               value: ^/emby/System/Info
    #         backendRefs:
    #           - identifier: app
    #             port: *port
    #       - name: protected
    #         backendRefs:
    #           - identifier: app
    #             port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      media:
        type: nfs
        server: truenas.services
        path: /mnt/BigPool/Media
      transcode:
        type: emptyDir