---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: posterizarr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: posterizarr
  values:
    controllers:
      posterizarr :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/fscorrupt/posterizarr
              tag: 3.1.3@sha256:7fb8d115226aedbee60e986c44e57d667f0c4bf93680038601c178d06c1967fb
            env:
              APP_PORT: &port 80
              RUN_TIME: disabled
              TERM: xterm
              TZ: America/New_York
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 30
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
      posters:
        type: nfs
        server: truenas.services
        path: /mnt/BigPool/Media/Posters
        globalMounts:
          - path: /assets
            subPath: assets
          - path: /assetsbackup
            subPath: assetsbackup
          - path: /manualassets
            subPath: manualassets
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /.cache
          - path: /.local