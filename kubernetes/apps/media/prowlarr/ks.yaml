---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prowlarr
  namespace: media
spec:
  components:
    - ../../../../components/oidc/envoy
    - ../../../../components/volsync
    - ../../../../components/kopiur/backup
  dependsOn:
    - name: pocket-id
      namespace: security
    - name: volsync
      namespace: volsync-system
    - name: cloudnative-pg-main-cluster
      namespace: databases
  interval: 30m
  path: ./kubernetes/apps/media/prowlarr/app
  postBuild:
    substitute:
      APP: prowlarr
      APP_ICON_URL: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/prowlarr.svg"
      OIDC_APP_NAME: Prowlarr
      VOLSYNC_CAPACITY: 5Gi
      KOPIUR_CAPACITY: 5Gi
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true 
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false