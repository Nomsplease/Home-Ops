---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sonarr
  namespace: media
spec:
  components:
    - ../../../../components/oidc/envoy
    - ../../../../components/kopiur/backup
    - ../../../../components/postgres/pass
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: databases
    - name: pocket-id
      namespace: security
    - name: kopiur
      namespace: kopiur-system
  interval: 30m
  path: ./kubernetes/apps/media/sonarr/app
  postBuild:
    substitute:
      APP: sonarr
      APP_ICON_URL: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/sonarr.svg"
      OIDC_APP_NAME: TV Shows (Sonarr)
      KOPIUR_CAPACITY: 5Gi
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true 
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
