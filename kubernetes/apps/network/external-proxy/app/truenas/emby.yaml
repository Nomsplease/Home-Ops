---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: emby
  labels:
    kubernetes.io/service-name: emby
addressType: IPv4
endpoints:
  - addresses:
      - 10.1.10.10
    conditions:
      ready: true
ports:
  - name: http
    port: 8096
---
apiVersion: v1
kind: Service
metadata:
  name: emby
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8096
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: emby
spec:
  hostnames: ["emby.noms.tv"]
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: emby
          port: 80
