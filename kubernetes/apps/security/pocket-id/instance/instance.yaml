# yaml-language-server: $schema=https://raw.githubusercontent.com/aclerici38/pocket-id-operator/refs/heads/main/dist/schemas/pocketidinstance_v1alpha1.json
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDInstance
metadata:
  name: pocket-id
spec:
  annotations:
    reloader.stakater.com/auto: "true"
  image: ghcr.io/pocket-id/pocket-id:v2.11.0-distroless@sha256:446624a84743c29f93db2ffbbe19f9059fd9741e0cb2516d31efcc764e131835
  versionCheckDisabled: true
  env:
    - name: TZ
      value: America/New_York

  analyticsDisabled: true

  encryptionKey:
    valueFrom:
      secretKeyRef:
        name: pocket-id-secret
        key: encryptionKey
  databaseUrl:
    valueFrom:
      secretKeyRef:
        name: pocket-id-postgres
        key: url
  hostUsers: true
  fileBackend: database

  persistence:
    enabled: false

  logging:
    level: info
    json: false
  # todo: service monitor for this
  metrics:
    enabled: true

  auditLogRetentionDays: 180

  appUrl: "https://id.${SECRET_DOMAIN}"
  route:
    enabled: true
    parentRefs:
      - name: envoy-external
        namespace: network
    hostnames: ["id.${SECRET_DOMAIN}"]

  smtp:
    host: smtp.protonmail.ch
    port: 587
    tls: starttls
    skipCertVerify: false
    from: &from "admin@${SECRET_DOMAIN}"
    user: *from
    password:
      valueFrom:
        secretKeyRef:
          name: pocket-id-secret
          key: smtpToken

  emailNotifications:
    apiKeyExpiration: true
    loginNotification: true
    oneTimeAccessAsAdmin: true
    oneTimeAccessAsUnauthenticated: false
    verification: true

  ui:
    appName: "Pocket ID"
    sessionDuration: 60
    homePageUrl: "/settings/apps"
    disableAnimations: false

  userManagement:
    allowUserSignups: "withToken"

  geoip:
    maxmindLicenseKey:
      valueFrom:
        secretKeyRef:
          name: pocket-id-secret
          key: maxmindLicenseKey