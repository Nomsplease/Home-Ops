apiVersion: v1
kind: Service
metadata:
  name: cdi-uploadproxy-loadbalancer
  labels:
    cdi.kubevirt.io: "cdi-uploadproxy"
  annotations:
    lbipam.cilium.io/ips: 10.1.20.29
spec:
  type: LoadBalancer
  ports:
    - port: 443
      targetPort: 8443
      nodePort: 31001
      protocol: TCP
  selector:
    cdi.kubevirt.io: cdi-uploadproxy
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cdi-uploadproxy
spec:
  hostnames: ["cdi-upload.noms.tv"]
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: cdi-uploadproxy
          port: 443