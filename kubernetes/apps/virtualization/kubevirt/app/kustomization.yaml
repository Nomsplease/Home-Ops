---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ./operator.yaml
patches:
  # watch this namespace
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: virt-operator
      spec:
        template:
          metadata:
            labels:
              app.kubernetes.io/created-by: kubevirt-operator
    target:
      kind: Deployment
      name: virt-operator
  # v1.8.2 install strategy grants backup.kubevirt.io and new subresource permissions
  # that the operator's own ClusterRole doesn't hold — RBAC escalation prevention blocks
  # it from granting permissions it doesn't have. Patch adds the missing rules.
  - patch: |-
      - op: add
        path: /rules/-
        value:
          apiGroups: ["backup.kubevirt.io"]
          resources: ["*"]
          verbs: ["*"]
      - op: add
        path: /rules/-
        value:
          apiGroups: ["subresources.kubevirt.io"]
          resources:
            - "virtualmachineinstances/evacuate/cancel"
            - "virtualmachines/evacuate/cancel"
            - "virtualmachineinstances/backup"
            - "virtualmachineinstances/redefine-checkpoint"
          verbs: ["update"]
    target:
      kind: ClusterRole
      name: kubevirt-operator