apiVersion: v1
kind: Service
metadata:
  labels:
    kubevirt.io/vm: sendspin-bt-bridge
  name: sendspin-bt-bridge
  annotations:
    lbipam.cilium.io/ips: 10.1.20.30
spec:
  ipFamilyPolicy: PreferDualStack
  ports:
  - name: ssh
    port: 22
    protocol: TCP
    targetPort: 22
  - name: httpd
    port: 8080
    protocol: TCP
    targetPort: 8080
  - name: vnc
    port: 5900
    protocol: TCP
    targetPort: 5900
  selector:
    kubevirt.io/vm: sendspin-bt-bridge
  type: LoadBalancer