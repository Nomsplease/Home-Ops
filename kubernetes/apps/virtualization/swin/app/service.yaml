apiVersion: v1
kind: Service
metadata:
  labels:
    kubevirt.io/vm: swin
  name: swin
  annotations:
    lbipam.cilium.io/ips: 10.1.20.30
spec:
  ports:
  - name: vnc
    port: 5900
    protocol: TCP
    targetPort: 5900
  - name: rdp
    port: 3389
    protocol: TCP
    targetPort: 3389
  selector:
    kubevirt.io/vm: swin
  type: LoadBalancer