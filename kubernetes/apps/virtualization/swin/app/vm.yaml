---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: swin
spec:
  runStrategy: RerunOnFailure
  template:
    metadata:
      labels:
        kubevirt.io/vm: swin
    spec:
      evictionStrategy: None
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - main-8
      domain:
        clock:
          utc: {}
        cpu:
          cores: 4
        resources:
          requests:
            memory: 4G
        devices:
          hostDevices:
            - name: p2000
              deviceName: nvidia.com/p2000
            - name: p2000-audio
              deviceName: nvidia.com/p2000-audio
          inputs:
            - type: tablet
              bus: usb
              name: tablet
          disks:
            # - bootOrder: 1 ##Force ISO Boot
            #   name: cdromiso ##Installer ISO
            #   cdrom:
            #     bus: sata
            - name: swin
              disk:
                bus: virtio
          interfaces:
          - name: default
            masquerade: {}
            macAddress: "02:00:00:00:00:01"
      networks:
        - name: default
          pod: {}
      volumes:
        - name: swin
          persistentVolumeClaim:
            claimName: swin
        # - name: cdromiso ##Installer ISO
        #   persistentVolumeClaim:
        #     claimName: ubuntu-26-04-desktop