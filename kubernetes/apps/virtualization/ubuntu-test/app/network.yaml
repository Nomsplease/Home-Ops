---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: ubuntu-test
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "name": "ubuntu-test",
      "plugins": [
        {
          "type": "macvlan",
          "master": "bond0.10",
          "mode": "bridge",
          "ipam": {
            "type": "static",
            "addresses": [
              {
                "address": "10.1.10.28/24",
                "gateway": "10.1.10.1"
              }
            ]
          }
        },
        {
          "type": "sbr"
        }
      ]
    }
