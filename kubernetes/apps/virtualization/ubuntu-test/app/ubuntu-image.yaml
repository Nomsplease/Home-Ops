---
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: ubuntu-24-04-desktop
spec:
  source:
    http:
      url: "http://releases.ubuntu.com/26.04/ubuntu-26.04-desktop-amd64.iso"
  storage:
    accessModes:
      - ReadWriteMany
    resources:
      requests:
        storage: 10Gi
    storageClassName: ceph-filesystem