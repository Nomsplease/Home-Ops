---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: ubuntu-test
spec:
  runStrategy: RerunOnFailure
  template:
    metadata:
      labels:
        kubevirt.io/vm: ubuntu-test
      # annotations:
      #   k8s.v1.cni.cncf.io/networks: |
      #     [
      #       {
      #         "name": "network",
      #         "namespace": "virtualization"
      #       }
      #     ]
    spec:
      evictionStrategy: LiveMigrateIfPossible
      domain:
        cpu:
          cores: 2
        resources:
          requests:
            memory: 4G
        devices:
          disks:
            - name: cdromiso
              cdrom:
                bus: sata
            - name: ubuntu-test
              disk:
                bus: virtio
          interfaces:
          - name: default
            masquerade: {}
            macAddress: "02:00:00:00:00:01"
          # - name: network
          #   bridge: {}
      networks:
        - name: default
          pod: {}
        # - name: network
        #   multus:
        #     # default: true
        #     networkName: network
      volumes:
        - name: ubuntu-test
          persistentVolumeClaim:
            claimName: ubuntu-test
        - name: cdromiso
          persistentVolumeClaim:
            claimName: ubuntu-26-04-desktop