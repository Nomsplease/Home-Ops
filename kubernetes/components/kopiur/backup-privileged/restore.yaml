---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: ${APP}
spec:
  policy:
    onMissingSnapshot: Continue
  source:
    fromPolicy:
      name: ${APP}
      offset: 0
  target:
    populator: {}
  mover:
    podSecurityContext:
      fsGroup: ${KOPIUR_PGID:=1000}
    privilegedMode: true
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
      capabilities:
        add:
          - DAC_OVERRIDE
          - DAC_READ_SEARCH
