---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: ${APP}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: ${HTTPROUTE_NAME:=${APP}}
      # Scopes the policy to the HTTPRoute rule named "protected" (Gateway API
      # HTTPRouteRule.name), so any other rule in the route bypasses forward auth.
      # Override OIDC_SECTION_NAME if the app's protected rule uses a different name.
      sectionName: ${OIDC_SECTION_NAME:=protected}
  oidc:
    provider:
      issuer: "https://id.${SECRET_DOMAIN}"
    clientID: "${OIDC_APP:=${APP}}"
    clientSecret:
      name: "${OIDC_APP:=${APP}}-oidc-credentials"
    redirectURL: "https://${SUBDOMAIN:=${OIDC_APP:=${APP}}}.${SECRET_DOMAIN}/oauth2/callback"
    logoutPath: "/logout"
    # profile scope is required for Pocket ID to include preferred_username in the ID token
    scopes: ["openid", "profile"]
    cookieNames:
      idToken: "${OIDC_APP:=${APP}}-id-token"
    # Required so the JWT provider below can parse the ID token cookie as a
    # plain JWT instead of Envoy Gateway's encrypted cookie format. This means
    # the ID and access tokens are stored as plaintext (HttpOnly) cookies.
    disableTokenEncryption: true
  # Re-validates the ID token cookie set by the oidc block above purely to
  # project the preferred_username claim onto a header for upstream apps.
  jwt:
    optional: true
    providers:
      - name: pocket-id
        issuer: "https://id.${SECRET_DOMAIN}"
        remoteJWKS:
          uri: "https://id.${SECRET_DOMAIN}/.well-known/jwks.json"
        extractFrom:
          cookies:
            - "${OIDC_APP:=${APP}}-id-token"
        claimToHeaders:
          - header: x-forwarded-user
            claim: preferred_username