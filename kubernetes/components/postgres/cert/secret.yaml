---
apiVersion: v1
kind: Secret
metadata:
  name: ${APP}-postgres
stringData:
  url: "postgresql://${DATABASE_OWNER:=${APP}}@pooler-rw.databases.svc:5432/${APP}?sslmode=verify-full&sslcert=/var/run/secrets/postgresql/tls.crt&sslkey=/var/run/secrets/postgresql/tls.key&sslrootcert=/var/run/secrets/root-ca/ca.crt"
  dsn: "Host=pooler-rw.databases.svc;Port=5432;Database=${APP};Username=${DATABASE_OWNER:=${APP}};SSL Mode=VerifyFull;Root Certificate=/var/run/secrets/root-ca/ca.crt;SSL Certificate=/var/run/secrets/postgresql/tls.crt;SSL Key=/var/run/secrets/postgresql/tls.key"
